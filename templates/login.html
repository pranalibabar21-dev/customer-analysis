<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>

    Login

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

    body{

      background-image:
      url("{{ url_for('static',
      filename='background.jpg') }}");

      background-size: cover;

      background-position: center;

      background-repeat: no-repeat;

      min-height: 100vh;

      display: flex;

     justify-content: center;

      align-items: center;
    }
.login-card{

    width:450px;

    background: rgba(
        255,
        255,
        255,
        0.95
    );

    border-radius:20px;

    padding:35px;

    box-shadow:
    0 10px 30px
    rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="login-card">

<div class="text-center mb-3">

    <h1>

        👤

    </h1>

</div>

<p class="text-center text-muted">

    Secure Login Portal

</p>

<hr>

<form
action="/login"
method="POST">

    <label>

        Username

    </label>

    <input
    type="text"
    name="username"
    class="form-control"
    required>

    <br>

    <label>

        Password

    </label>

    <input
    type="password"
    name="password"
    class="form-control"
    required>

    <br>

    <button
    type="submit"
    class="btn btn-primary w-100">

        Sign In

    </button>

</form>

<div class="d-flex justify-content-between mt-3">

    <a href="/forgot_password">

        Forgot Password?

    </a>

    <a href="/register">

        Create Account

    </a>

</div>


<div class="text-center mt-3">

    <small class="text-muted">

        Customer Sales & Churn Analysis System

    </small>

</div>
</div>

</body>

</html>
