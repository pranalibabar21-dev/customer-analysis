<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Customer Sales and Churn Analysis System</h1>

        <div class="login-box">

            <h2>Login</h2>

            <form method="POST">

                <input type="text"
                    name="username"
                    placeholder="Enter Username"
                    required>

                <input type="password"
                    name="password"
                    placeholder="Enter Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>
            <br><br>

<a href="/register">
    Create New Account
</a>

            {% if error %}

                <p class="error">
                    {{ error }}
                </p>

            {% endif %}

        </div>

    </div>

</body>

</html>
